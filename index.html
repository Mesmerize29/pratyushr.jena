<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Pratyush Jena | Systems, Security, AI, Nature</title>
    <meta
      name="description"
      content="Public portfolio of Pratyush Jena, focused on AI, cybersecurity, HCI, robotics, sensing systems, and long-horizon technology for real-world impact."
    />
    <meta
      name="theme-color"
      content="#08111f"
    />

    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/layout.css" />
    <link rel="stylesheet" href="./css/sections.css" />
    <link rel="stylesheet" href="./css/motion.css" />
    <link rel="stylesheet" href="./css/responsive.css" />
  </head>
  <body>
    <div class="site-shell">
      <div class="ambient">
        <div class="ambient__grid"></div>
        <div class="ambient__glow ambient__glow--one"></div>
        <div class="ambient__glow ambient__glow--two"></div>
        <div class="ambient__mist"></div>
      </div>

      <header class="topbar">
        <div class="brand">
          <span class="brand__dot"></span>
          <div>
            <p class="brand__name">Pratyush Jena</p>
            <p class="brand__sub">Immersive public portfolio</p>
          </div>
        </div>

        <div class="topbar__meta">
          <div class="counter" id="sectionCounter">01 / 07</div>
          <div class="active-label" id="activeLabel">Overview</div>
        </div>
      </header>

      <main class="app-main" id="appMain">
        <section class="orbit-experience" aria-label="Portfolio experience">
          <div class="orbit-stage">
            <div class="orbit-ring" id="orbitRing"></div>
          </div>

          <nav
            class="orbit-nav"
            id="orbitNav"
            aria-label="Section navigation"
          ></nav>
        </section>
      </main>

      <div class="scroll-hint">
        <span>Scroll</span>
        <span class="scroll-hint__divider"></span>
        <span>Rotate</span>
      </div>
    </div>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
